nubank:
  formats:
    - csv
  csv:
    date_col: Data
    description_col: Descrição
    amount_col: Valor
    date_format: "%Y-%m-%d"
    encoding: utf-8
    separator: ","
    # Nubank: negative = expense (debit), positive = income (credit)
    amount_sign: natural

bradesco:
  formats:
    - pdf
    - csv
  csv:
    date_col: Data
    description_col: Histórico
    amount_col: Valor
    date_format: "%d/%m/%Y"
    encoding: latin-1
    separator: ";"
  pdf:
    table_header_keywords:
      - "Histórico"
      - "Data"
      - "Valor"
    date_format: "%d/%m/%Y"

