generic:
  formats:
    - csv
    - ofx
  csv:
    # Heuristic: try to detect columns automatically
    auto_detect: true
    date_format_candidates:
      - "%d/%m/%Y"
      - "%Y-%m-%d"
      - "%d-%m-%Y"
      - "%d/%m/%y"
    encoding_candidates:
      - utf-8
      - latin-1
      - cp1252
